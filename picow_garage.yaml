substitutions: # https://esphome.io/guides/configuration-types.html#substitutions
  devicename: picow_garage
  friendlyname: Pi COW

  # These define the credentials for the Access Point (AP) the PiCOW will create
  # if it cannot connect to your primary Wi-Fi network. This acts as a fallback
  # for initial setup or troubleshooting.
  fallback_ssid: <<ap_ssid_name>>
  fallback_ssid_password: <<ap_ssid_password>>
  
  api_encryption_key: <<api_encryption>>
  ota_password: <<ota_password>>
  
  # Pulse the onboard LED light every XX milliseconds !! DO NOT PUT IT LOWER THAN 1000 !!
  status_led_pulse_time: "2000"

  # Enable a wait period for closing the garage door with the control box.
  # 0 = disabled (instant close), 1 = enabled (use control_box_close_wait_time)
  control_box_close_wait_enable: 1

  # How long, in millieseconds, to wait before closing the garage door (when using the control box)
  # This allows a user to exit via the garage door before the door is requested to be closed.
  control_box_close_wait_time: "30000"   

  # How long, in milliseconds, it takes for the garage door to open and close, this will act as a timeout.
  garage_door_time: "20000" 
  garage_door_debounce_time: "500" # https://esphome.io/components/binary_sensor/gpio.html#debouncing-values

  # How long, in milliseconds, to hold the contact for the open, close and stop commands.
  contact_open_hold_time: "500"
  contact_close_hold_time: "500"
  contact_stop_hold_time: "5000"
  contact_debounce_time: "10" # https://esphome.io/components/binary_sensor/gpio.html#debouncing-values

  # Car Presence Sensor, HC-SR04 ultrasonic sensor
  car_presence_detect_distance: "0.50" # distance is in meters to assume car is present ("HOME"), i.e. 0.50 is 50cm, 1.00 is 1meter
  car_presence_detect_time: "30000" # time in seconds to "ping" to see if an object is present.

  # Pin numbers for garage door
  # Control Pins
  garage_open_contact_pin: 0
  garage_close_contact_pin: 1
  garage_stop_contact_pin: 2

  # Door State Pins (Contact Sensors)
  garage_open_state_pin: 5
  garage_closed_state_pin: 6

  # External Control Box Input Pins
  control_box_open_pin: 8
  control_box_close_pin: 9
  control_box_stop_pin: 10
  control_box_enabled_pin: 11

  # Dallas Temperature Sensor  https://esphome.io/components/sensor/dallas_temp.html
  dallas_outdoor_temperature_sensor_address: "0x560621302c840b28"
  dallas_outdoor_temperature_update_interval: "120"
  dallas_case_temperature_sensor_address: "0x623ce60457dbca28"
  dallas_case_temperature_update_interval: "120"

  # Values for the OLED Display
  oled_sda: "12"
  oled_scl: "13"
  oled_address: "0x3C"

  oled_display_initial_value: ${devicename}

  # How long, in milliseconds, to display each page
  oled_page_rotation_time: 10000

  # Enable a safety feature to stop the door if magnetic sensors detect an invalid state.
  # 0 = disabled, 1 = enabled
  stop_on_sensor_error: 1

  # Enable the limit switch safety feature to automatically stop the door when it hits a sensor
  # 0 = disabled, 1 = enabled
  enable_limit_switches: 1

esphome:
  name: ${devicename}
  min_version: 2026.4.3 # https://esphome.io/components/esphome/#minimum-esphome-version
  
  includes:
    - <Arduino.h>

  platformio_options:
    board_build.f_cpu: 133000000L

  on_boot:
    priority: 800.0 
    then:
      - delay: 500ms
      - if:
          condition:
            lambda: 'return digitalRead(${control_box_stop_pin}) == LOW;'
          then:
            - logger.log: "BOOT: E-STOP is active—skipping loading screen"
            - lambda: |-
                id(is_booting) = true;
                id(stop_active) = true; 
            - switch.turn_on: ${devicename}_contact_stop
            - globals.set:
                id: oled_info_global
                value: '"E-STOP"'
            - display.page.show: page_emergency_stop
            - component.update: oled_display
          else:
            - logger.log: "BOOT: E-STOP is clear—starting loading sequence"
            - lambda: |-
                id(is_booting) = true;
                id(stop_active) = false;
            - display.page.show: page_boot
            - script.execute: boot_loading_script

rp2040:
  board: rpipicow
  # framework:
    # Required until https://github.com/platformio/platform-raspberrypi/pull/36 is merged
    # platform_version: https://github.com/maxgerhardt/platform-raspberrypi.git


# Enable logging https://esphome.io/components/logger.html#
logger:
  level: DEBUG

# Enable Home Assistant API
api:
  encryption:
    key: ${api_encryption_key}

# https://next.esphome.io/components/ota/esphome
ota:
  - platform: esphome
    password: ${ota_password}

# https://esphome.io/components/wifi/
wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  fast_connect: true
  power_save_mode: none
  post_connect_roaming: true

  # Enable fallback hotspot in case wifi connection fails
  ap:
    ssid: ${fallback_ssid}
    password: ${fallback_ssid_password}

# Enable a web server for the Captive Portal to function
web_server:
  port: 80
  version: 3

# Enable the fallback portal if WiFi fails
# https://esphome.io/components/captive_portal/
captive_portal:

# Get the time from Home Assistant to sync the onboard real-time clock.
time:
#  - platform: homeassistant
  - platform: sntp
    id: ${devicename}_time
    timezone: Europe/London
    servers: 
      - time.google.com
    on_time_sync:
      then:
        - logger.log: "Time synchronized. Resetting uptime sensor."
        - lambda: |-
            id(${devicename}_uptime_s).publish_state(0);

output:
  # OnBoard Pico W LED
  - platform: gpio
    pin: LED
    id: ${devicename}_OnBoard_LED

  # Output pin on the Pico W
  # LED Status Pulse (confidence)
  - platform: gpio
    pin:
      number: 21
      mode: output
    id: ${devicename}_External_LED


# Pulse the onboard LED every x seconds, status light
interval:
  - interval: ${status_led_pulse_time}ms
    then:
      - output.turn_on: ${devicename}_OnBoard_LED
      - output.turn_on: ${devicename}_External_LED
      - delay: 500ms
      - output.turn_off: ${devicename}_OnBoard_LED
      - output.turn_off: ${devicename}_External_LED
  
  - interval: 500ms
    then:
      - if:
          condition:
            lambda: 'return id(stop_active);'
          then:
            - component.update: oled_display

# OLED Display Page Rotation
  - interval: ${oled_page_rotation_time}ms
    then:
      - lambda: |-
          if (id(is_booting)) return; 
          if (id(stop_active)) return;
          if (id(is_counting_down)) return;
          if (id(garage_door_action_in_progress)) return;
          
          // Increment the page index
          id(oled_page) = (id(oled_page) + 1) % 2;
          
          id(oled_display).show_page(page_main);
          id(oled_display).update();


# NEW: High-frequency update for the countdown page
  - interval: 100ms
    then:
      - if:
          condition:
            - lambda: 'return id(is_counting_down);'
          then:
            - component.update: oled_display


# https://esphome.io/components/globals.html
# Set the information text on the OLED display
globals:
  # Store the OLED Display Message here
  - id: oled_info_global
    type: std::string
    initial_value: '"${oled_display_initial_value}"'

  # A global variable to track if a garage door action is in progress
  - id: garage_door_action_in_progress
    type: bool
    initial_value: "false"

  # Global variable for OLED page number
  - id: oled_page
    type: int
    initial_value: "0"

  # Global variable for the countdown
  - id: countdown_start_time
    type: unsigned long
    initial_value: "0"
  
  # Global variable to indicate if a countdown is in progress
  - id: is_counting_down
    type: bool
    initial_value: "false"

   # Global variables for the boot loading screen
  - id: boot_progress
    type: float
    initial_value: "0.0"

  - id: is_booting
    type: bool
    initial_value: "true"

  - id: stop_active
    type: bool
    initial_value: "true"

binary_sensor:

# https://esphome.io/components/binary_sensor/status.html
  - platform: status
    name: "Power Status"
    id: ${devicename}_power_status
    icon: "mdi:power-plug"

  - platform: template
    name: "Car Presence"
    device_class: presence
    id: ${devicename}_car_presence_status
    icon: "mdi:car"
    lambda: |-
      if (id(${devicename}_car_presence_distance).state < ${car_presence_detect_distance}) {
          return true;
      } else {
          return false;
      }

###### START >> GARAGE DOOR OPEN/CLOSE CONTACT SENSOR(s) ######

  - platform: template
    name: "Position"
    id: ${devicename}_position
    icon: "mdi:ruler"
    device_class: garage_door
    lambda: |-
      if (id(${devicename}_open).state) {
        return true;
      } else if (id(${devicename}_closed).state) {
        return false;
      } else {
        // Door is not at either end, so it must be moving
        return true;
      }

  - platform: template
    name: "Status"
    id: ${devicename}_status
    icon: "mdi:list-status"
    device_class: problem

# Door OPEN
  - platform: gpio
    pin:
      number: ${garage_open_state_pin}
      mode:
        input: true
        pullup: true
        output: false
        open_drain: false
        pulldown: false
      inverted: true
    id: ${devicename}_open
    internal: true
    trigger_on_initial_state: true
    filters:
      - delayed_off: ${garage_door_debounce_time} ms
    on_state:
      then:
        # Stop the door when it reaches its open position
        - if:
            condition:
              and:
                - binary_sensor.is_on: ${devicename}_open
                - lambda: 'return "${enable_limit_switches}" == "1";'
            then:
              - logger.log: "Door OPEN limit detected. Triggering STOP."
              - switch.turn_on: ${devicename}_contact_stop

        # Check for invalid sensor state (both on at once) as a separate safety feature
        - if:
            condition:
              and:
                - binary_sensor.is_on: ${devicename}_open
                - binary_sensor.is_on: ${devicename}_closed
            then:
              - if:
                  condition:
                    - lambda: 'return "${stop_on_sensor_error}" == "1";'
                  then:
                    - logger.log: "INVALID SENSOR STATE DETECTED! TRIGGERING STOP!"
                    - switch.turn_on: ${devicename}_contact_stop

        - logger.log: "OPEN contact state change detected"
        - script.execute: ${devicename}_garage_door_status_script
        - script.execute: set_action_complete_script

# Door CLOSED
  - platform: gpio
    pin:
      number: ${garage_closed_state_pin}
      mode:
        input: true
        pullup: true
        output: false
        open_drain: false
        pulldown: false
      inverted: true
    id: ${devicename}_closed
    internal: true
    trigger_on_initial_state: true
    filters:
      - delayed_off: ${garage_door_debounce_time} ms
    on_state:
      then:
        # Stop the door when it reaches its closed position
        - if:
            condition:
              and:
                - binary_sensor.is_on: ${devicename}_closed
                - lambda: 'return "${enable_limit_switches}" == "1";'
            then:
              - logger.log: "Door CLOSED limit detected. Triggering STOP."
              - switch.turn_on: ${devicename}_contact_stop

        # Check for invalid sensor state (both on at once) as a separate safety feature
        - if:
            condition:
              and:
                - binary_sensor.is_on: ${devicename}_open
                - binary_sensor.is_on: ${devicename}_closed
            then:
              - if:
                  condition:
                    - lambda: 'return "${stop_on_sensor_error}" == "1";'
                  then:
                    - logger.log: "INVALID SENSOR STATE DETECTED! TRIGGERING STOP!"
                    - switch.turn_on: ${devicename}_contact_stop

        - logger.log: "CLOSED contact state change detected"
        - script.execute: ${devicename}_garage_door_status_script
        - script.execute: set_action_complete_script

###### END >> GARAGE DOOR OPEN/CLOSE CONTACT SENSOR(s) ######


###### START >> EXTERNAL CONTROL BOX INPUTS ######

# GPI for remote button press to OPEN garage door
  - platform: gpio
    pin:
      number: ${control_box_open_pin}
      mode:
        input: true
        pullup: true
      inverted: true
    name: "Control Box Open"
    id: ${devicename}_control_box_open
    icon: "mdi:garage-open"
    filters:
      - delayed_on: ${contact_debounce_time}ms
    on_press:
      then:
        - if:
            condition:
              - binary_sensor.is_on: ${devicename}_control_box_enabled
            then:
              - globals.set:
                  id: garage_door_action_in_progress
                  value: "true"
              - script.stop: close_door_script # Cancel any pending close command
              - script.execute: open_door_script # Execute the new open script

 # GPI for remote button press to CLOSE garage door
  - platform: gpio
    pin:
      number: ${control_box_close_pin}
      mode:
        input: true
        pullup: true
      inverted: true # https://esphome.io/components/binary_sensor/gpio/#inverting-values
    name: "Control Box Close"
    id: ${devicename}_control_box_close
    icon: "mdi:garage"
    filters:
      - delayed_on: ${contact_debounce_time} ms # https://esphome.io/components/binary_sensor/gpio/#debouncing-values
    on_press:
      then:
        - if:
            condition:
              and:
              - binary_sensor.is_on: ${devicename}_control_box_enabled
              - binary_sensor.is_off: ${devicename}_closed
            then:
              - script.stop: open_door_script # Cancel any pending open command
              - script.execute: close_door_script # Execute the new close script


# GPI for remote button press to STOP garage door
  - platform: gpio
    pin:
      number: ${control_box_stop_pin}
      mode:
        input: true
        pullup: true
      inverted: true
    name: "Control Box Stop"
    id: ${devicename}_control_box_stop
    icon: "mdi:garage-alert"
    internal: false
    filters:
      - delayed_on: 10ms
    on_press:
      - lambda: 'id(stop_active) = true;' # LOCK logic
      - script.stop: open_door_script
      - script.stop: close_door_script
      - switch.turn_on: ${devicename}_contact_stop
      - logger.log: "CONTROL BOX STOP PRESSED !!"
      - globals.set:
          id: oled_info_global
          value: '"E-STOP"'
      - display.page.show: page_emergency_stop
      - component.update: oled_display
      
    on_release:
      - lambda: 'id(stop_active) = false;' # UNLOCK logic
      - logger.log: "CONTROL BOX STOP RELEASED !!"
      - switch.turn_off: ${devicename}_contact_stop
     
      - if:
          condition:
            lambda: 'return id(is_booting);'
          then:
            - logger.log: "Resuming interrupted boot sequence..."
            - script.execute: boot_loading_script
          else:
            # Normal operation release
            - script.execute: ${devicename}_garage_door_status_script
            - display.page.show: page_main
            - component.update: oled_display

# GPI for remote switch to ENABLE garage door external control box
# Also used for resetting the PiCOW, if pattern is matched
  - platform: gpio
    pin:
      number: ${control_box_enabled_pin}
      mode:
        input: true
        pullup: true
      inverted: true # https://esphome.io/components/binary_sensor/gpio/#inverting-values
    name: "Control Box Enabled"
    id: ${devicename}_control_box_enabled
    icon: "mdi:toggle-switch"
    filters:
      - delayed_on: 10ms # https://esphome.io/components/binary_sensor/gpio/#debouncing-values
    on_multi_click: # https://esphome.io/components/binary_sensor/index.html#on-multi-click
    - timing:
        - OFF for at most 2000ms # Enable button should be OFF for under XXXX ms
        - ON for at least 500ms # Enable button should be ON for over XXXms
      then:
        - logger.log: "Control Box Reset"
        - delay: 1000ms
        - globals.set: # Update OLED Display
            id: oled_info_global
            value: '"RESTART"'
        - component.update: oled_info_text
        - component.update: oled_display
        - delay: 5000ms
        - button.press: ${devicename}_restart

###### END >> EXTERNAL BOX INPUTS ######


switch:
###### START >> OUTPUTS TO GARAGE DOOR contact ######

  - platform: template
    name: "Open"
    icon: "mdi:arrow-up-bold"
    id: ${devicename}_contact_open
    lambda: |-
      return id(${devicename}_contact_open_internal).state;
    turn_on_action:
      - script.execute: open_door_script
    turn_off_action:
      - switch.turn_off: ${devicename}_contact_open_internal

  - platform: template
    name: "Close"
    icon: "mdi:arrow-down-bold"
    id: ${devicename}_contact_close
    lambda: |-
      return id(${devicename}_contact_close_internal).state;
    turn_on_action:
      - script.execute: close_door_script_no_countdown
    turn_off_action:
      - switch.turn_off: ${devicename}_contact_close_internal

  - platform: template
    name: "Security Lockout"
    id: ${devicename}_security_lockout
    icon: "mdi:garage-lock"
    optimistic: true
    restore_mode: RESTORE_DEFAULT_OFF
    on_turn_off:
      then:
        - globals.set:
            id: garage_door_action_in_progress
            value: "false"
        - script.execute: ${devicename}_garage_door_status_script

  - platform: template
    name: "Stop"
    icon: "mdi:stop"
    id: ${devicename}_contact_stop
    lambda: |-
      if (id(${devicename}_contact_stop_internal).state) {
        return true;
      } else {
        return false;
      }
    turn_on_action:
      - switch.turn_off: ${devicename}_contact_open_internal
      - switch.turn_off: ${devicename}_contact_close_internal
      - delay: 50ms
      - switch.turn_on: ${devicename}_contact_stop_internal
      - delay: ${contact_stop_hold_time} ms # Hold the contact for the configured time
      - switch.turn_off: ${devicename}_contact_stop_internal
    turn_off_action:
      if:
        condition:
          # This condition prevents the switch from turning off if the physical E-STOP button is still pressed.
          - binary_sensor.is_off: ${devicename}_control_box_stop
        then:
          - switch.turn_off: ${devicename}_contact_stop_internal
        else:
          - logger.log: "Control Box STOP ACTIVE Cancelling Turn OFF Request!!"


  # Contact OPEN
  - platform: gpio
    id: ${devicename}_contact_open_internal
    internal: true
    pin:
      number: ${garage_open_contact_pin}
      inverted: true
      mode:
        input: false
        pullup: false
        output: true
        open_drain: false


  # Contact CLOSE
  - platform: gpio
    id: ${devicename}_contact_close_internal
    internal: true
    pin:
      number: ${garage_close_contact_pin}
      inverted: true
      mode:
        input: false
        pullup: false
        output: true
        open_drain: false


  # Contact STOP
  - platform: gpio
    id: ${devicename}_contact_stop_internal
    internal: true
    pin:
      number: ${garage_stop_contact_pin}
      inverted: true
      mode:
        input: false
        pullup: false
        output: true
        open_drain: false

###### END >> OUTPUTS TO GARAGE DOOR contact ######


# https://esphome.io/components/one_wire.html
one_wire:
  - platform: gpio
    pin: GPIO17

sensor:

  # https://esphome.io/components/sensor/ultrasonic.html
  - platform: ultrasonic
    trigger_pin: 28
    echo_pin: 27
    timeout: 4.0m
    name: "Car Presence Distance Sensor"
    id: ${devicename}_car_presence_distance
    update_interval: ${car_presence_detect_time} ms
    unit_of_measurement: "m"
    accuracy_decimals: 2
    icon: "mdi:arrow-expand-horizontal"
    internal: true # Comment this out in order to display stats in Home Assistant
    # This lambda adjusts the distance based on the Dallas temperature sensor
    filters:
      - filter_out: nan
      - lambda: |-
          float temp = id(${devicename}_dallas_case_temperature).state;
          if (std::isnan(temp)) {
            return x; // Fallback to default if temp sensor is failing
          }
          // Formula: Adjusted Distance = Original * (Actual Speed of Sound / Speed at 20C)
          // Actual speed = 331.3 + 0.606 * temp
          // Default speed (at 20C) = 343.42
          return x * ((331.3 + 0.606 * temp) / 343.42);
      - median:
          window_size: 5
          send_every: 1
          send_first_at: 1

  # https://esphome.io/components/sensor/dallas_temp.html
  - platform: dallas_temp
    address: ${dallas_outdoor_temperature_sensor_address}
    name: "Outdoor Temperature" 
    id: ${devicename}_dallas_outdoor_temperature
    icon: "mdi:sun-thermometer-outline"
    update_interval: ${dallas_outdoor_temperature_update_interval}s

  - platform: dallas_temp
    address: ${dallas_case_temperature_sensor_address}
    name: "Case Temperature"
    id: ${devicename}_dallas_case_temperature
    update_interval: ${dallas_case_temperature_update_interval}s
    icon: "mdi:thermometer"

  - platform: internal_temperature
    name: "Microcontroller Temperature"
    icon: "mdi:thermometer"
    id: ${devicename}_temperature

  - platform: wifi_signal # Report the WiFi signal strength/RSSI in dB
    name: "WiFi Signal (dB)"
    id: ${devicename}_wifi_signal_db
    update_interval: 30s
    icon: mdi:wifi
    entity_category: "diagnostic"
    internal: true # Comment this out in order to display stats in Home Assistant

  - platform: copy # Report the WiFi signal strength in %
    source_id: ${devicename}_wifi_signal_db
    name: "WiFi Signal Numeric (%)"
    id: ${devicename}_wifi_signal_percentage_numeric
    filters:
      - lambda: return min(max(2 * (x + 100.0), 0.0), 100.0);
    unit_of_measurement: "Signal %"
    icon: mdi:wifi
    entity_category: "diagnostic"
    internal: true

  - platform: uptime # Uptime of the PicoW
    update_interval: 30s
    id: ${devicename}_uptime_s
    internal: true # Comment this out in order to display stats in Home Assistant


# Convert the Uptime to Days Hours Minutes Seconds
text_sensor:
  - platform: template
    name: "Uptime"
    id: ${devicename}_uptime
    icon: mdi:clock-start
    update_interval: 300s
    lambda: |-
      int total_seconds = id(${devicename}_uptime_s).state;
      if (total_seconds > 60) { // If uptime is greater than 1 minutes (60 seconds), assume it's a valid value
        int days = total_seconds / 86400;
        int hours = (total_seconds % 86400) / 3600;
        int minutes = (total_seconds % 3600) / 60;
        char buffer[30];
        sprintf(buffer, "%02dd %02dh %02dm", days, hours, minutes);
        return {buffer};
      } else {
        return {"unknown"};
      }

  - platform: wifi_info
    ip_address:
      name: "IP Address"
      id: ${devicename}_ip_address
      icon: "mdi:ip-network"
    ssid:
      name: "SSID"
      id: ${devicename}_ssid
      icon: "mdi:wifi"
    mac_address:
      name: "MAC Address"
      id: ${devicename}_mac_address
      icon: "mdi:network"
    bssid:
      name: "Connected BSSID"
      id: ${devicename}_bssid
      icon: "mdi:router-wireless"
    scan_results:
      name: "Scan Results"
      id: ${devicename}_scan_results
      icon: "mdi:radar"
      internal: true
    power_save_mode:
      name: "Wifi Power Save Mode"
      id: ${devicename}_power_save_mode
      icon: "mdi:leaf"

  - platform: template
    id: ${devicename}_uptime_oled
    update_interval: 30s    # This is for the OLED display
    internal: true      # This hides the sensor from Home Assistant
    lambda: |-
      int total_seconds = id(${devicename}_uptime_s).state;
      int days = total_seconds / 86400;
      int hours = (total_seconds % 86400) / 3600;
      int minutes = (total_seconds % 3600) / 60;
      char buffer[30];
      sprintf(buffer, "%02dd %02dh %02dm", days, hours, minutes);
      return {buffer};

  - platform: template
    name: "WiFi Signal (%)"
    id: ${devicename}_wifi_signal_percentage
    lambda: |-
      char buffer[8]; // Adjust buffer size if needed based on expected precision
      sprintf(buffer, "%.0f%%", id(${devicename}_wifi_signal_percentage_numeric).state);
      return {buffer};
    update_interval: 30s
    icon: mdi:percent
    entity_category: "diagnostic"
    internal: true

  - platform: template
    name: "OLED Information Display"
    id: oled_info_text
    icon: "mdi:monitor-screenshot"
    lambda: 'return id(oled_info_global);'
    update_interval: never

# Restart button
button:
  - platform: restart
    name: "Restart"
    id: ${devicename}_restart
    icon: "mdi:power-cycle"
    on_press:
      then:
      - logger.log: "Restart Requested !!"
      - button.press: ${devicename}_restart

# Home Assistant Cover
cover:
  - platform: template
    name: "Door"
    id: ${devicename}_cover
    device_class: garage
    icon: "mdi:garage"
    lambda: |-
      if (id(${devicename}_open).state) {
        return 1.0;
      } else if (id(${devicename}_closed).state) {
        return 0.0;
      } else {
        return 0.5;
      }
    open_action:
      - globals.set:
          id: garage_door_action_in_progress
          value: "true"
      - script.execute: open_door_script
    close_action:
      - script.execute: close_door_script_no_countdown
    stop_action:
      - script.execute: stop_door_script


###### START >> Garage Door position logic ######

script: # https://esphome.io/components/script/

# Helper script to set in-progress to TRUE
  - id: set_action_in_progress_script
    then:
      - globals.set:
          id: garage_door_action_in_progress
          value: "true"

# Helper script to set in-progress to FALSE
  - id: set_action_complete_script
    then:
      - globals.set:
          id: garage_door_action_in_progress
          value: "false"

# script to handle the open sequence
  - id: open_door_script
    then:
      - if:
          condition:
            # ONLY proceed if NOT booting AND NOT locked
            - and:
                - lambda: 'return !id(is_booting);'
                - switch.is_off: ${devicename}_security_lockout
          then:
            - globals.set:
                id: garage_door_action_in_progress
                value: "true"
            - globals.set:
                id: oled_page
                value: "0"
            - switch.turn_off: ${devicename}_contact_close
            - switch.turn_on: ${devicename}_contact_open
            - globals.set:
                id: oled_info_global
                value: '"OPENING"'
            - component.update: oled_info_text
            - component.update: oled_display
            - wait_until:
                condition:
                  - binary_sensor.is_on: ${devicename}_open
                timeout: ${garage_door_time}ms
            - if:
                condition:
                  - not:
                    - binary_sensor.is_on: ${devicename}_open
                then:
                  - script.execute: garage_door_timeout_script
          else:
            # Determine if it's blocked by Boot or Lockout
            - if:
                condition:
                  - lambda: 'return id(is_booting);'
                then:
                  - logger.log: "Open command ignored: System is still booting."
                  # We don't change the OLED here to avoid clobbering the loading bar
                else:
                  # It must be the Security Lockout
                  - globals.set:
                      id: oled_info_global
                      value: '"LOCKED"'
                  - component.update: oled_display
                  - logger.log: "Open command ignored: Security Lockout is active."
                  - delay: 10s
                  - globals.set:
                      id: garage_door_action_in_progress
                      value: "false"
                  - script.execute: ${devicename}_garage_door_status_script

# script to handle the close sequence
  # script to handle the close sequence
  - id: close_door_script
    then:
      - if:
          condition:
            # ONLY proceed if NOT booting AND NOT locked
            - and:
                - lambda: 'return !id(is_booting);'
                - switch.is_off: ${devicename}_security_lockout
          then:
            - globals.set:
                id: garage_door_action_in_progress
                value: "true"
            - globals.set:
                id: oled_page
                value: "0"
            - if:
                condition:
                  - lambda: 'return ${control_box_close_wait_enable} == 1;'
                then:
                  - logger.log: "Executing close_door_script with a wait_until countdown"
                  - lambda: |-
                      id(countdown_start_time) = millis();
                      id(is_counting_down) = true;
                  - display.page.show: countdown_page
                  - globals.set:
                      id: oled_info_global
                      value: '"CLOSING SOON..."'
                  - component.update: oled_info_text
                  - wait_until:
                      condition:
                        - lambda: |-
                            return (millis() - id(countdown_start_time)) >= ${control_box_close_wait_time};
                      timeout: ${control_box_close_wait_time}ms
                  
                  - globals.set:
                      id: is_counting_down
                      value: "false"
                  - globals.set:
                      id: oled_info_global
                      value: '"CLOSING"'
                  - display.page.show: page_main
                  - component.update: oled_display

                  - if:
                      condition:
                        - not:
                          - binary_sensor.is_on: ${devicename}_control_box_stop
                      then:
                        - logger.log: "Executing close command after countdown"
                        - switch.turn_off: ${devicename}_contact_open
                        - switch.turn_on: ${devicename}_contact_close
                        - wait_until:
                            condition:
                              - binary_sensor.is_on: ${devicename}_closed
                            timeout: ${garage_door_time}ms
                        - if:
                            condition:
                              - not:
                                - binary_sensor.is_on: ${devicename}_closed
                            then:
                              - script.execute: garage_door_timeout_script
                      else:
                        - logger.log: "Close command cancelled by E-STOP"
                        - globals.set:
                            id: oled_info_global
                            value: '"E-STOP"'
                        - component.update: oled_display
                        - display.page.show: page_emergency_stop
                else:
                  - logger.log: "Close wait period disabled. Closing immediately."
                  - if:
                      condition:
                        - not:
                          - binary_sensor.is_on: ${devicename}_control_box_stop
                      then:
                        - logger.log: "Executing close command"
                        - globals.set:
                            id: oled_info_global
                            value: '"CLOSING"'
                        - display.page.show: page_main
                        - component.update: oled_display
                        - switch.turn_off: ${devicename}_contact_open
                        - switch.turn_on: ${devicename}_contact_close
                        - wait_until:
                            condition:
                              - binary_sensor.is_on: ${devicename}_closed
                            timeout: ${garage_door_time}ms
                        - if:
                            condition:
                              - not:
                                - binary_sensor.is_on: ${devicename}_closed
                            then:
                              - script.execute: garage_door_timeout_script
                      else:
                        - logger.log: "Close command cancelled by E-STOP"
                        - globals.set:
                            id: oled_info_global
                            value: '"E-STOP"'
                        - component.update: oled_display
                        - display.page.show: page_emergency_stop
          else:
            # Determine if it's blocked by Boot or Lockout
            - if:
                condition:
                  - lambda: 'return id(is_booting);'
                then:
                  - logger.log: "Close command ignored: System is still booting."
                  # No OLED update here to preserve the loading screen progress
                else:
                  # Provide feedback that the door is locked
                  - globals.set:
                      id: oled_info_global
                      value: '"LOCKED"'
                  - component.update: oled_display
                  - logger.log: "Close command ignored: Security Lockout is active."
                  - delay: 10s
                  - globals.set:
                      id: garage_door_action_in_progress
                      value: "false"
                  - script.execute: ${devicename}_garage_door_status_script

  - id: close_door_script_no_countdown
    then:
      - if:
          condition:
            - switch.is_off: ${devicename}_security_lockout
          then:
            - script.execute: set_action_in_progress_script
            - globals.set:
                id: oled_page
                value: "0"
            - if:
                condition:
                  - not:
                    - binary_sensor.is_on: ${devicename}_control_box_stop
                then:
                  - logger.log: "Executing close command without countdown"
                  - switch.turn_off: ${devicename}_contact_open
                  - switch.turn_on: ${devicename}_contact_close
                  - globals.set:
                      id: oled_info_global
                      value: '"CLOSING"'
                  - component.update: oled_info_text
                  - component.update: oled_display
                  - display.page.show: page_main
                else:
                  - logger.log: "Close command cancelled by E-STOP"
                  - globals.set:
                      id: oled_info_global
                      value: '"E-STOP"'
                  - component.update: oled_info_text
                  - component.update: oled_display
                  - display.page.show: page_emergency_stop
          else:
            - globals.set:
                id: oled_info_global
                value: '"LOCKED"'
            - component.update: oled_display
            - logger.log: "Close (no-countdown) command ignored: Security Lockout is active."
  

  - id: stop_door_script
    then:
      - logger.log: "SCRIPT: Door Stop Script"
      - switch.turn_on: ${devicename}_contact_stop
  
  - id: ${devicename}_garage_door_status_script
    mode: single
    then:
      - logger.log: "SCRIPT: Door Status Script"
      - if:
          condition:
            and:
              - binary_sensor.is_off: ${devicename}_open
              - binary_sensor.is_on: ${devicename}_closed
          then:
            - binary_sensor.template.publish:
                id: ${devicename}_status
                state: OFF
            - logger.log: "SCRIPT: Door Status CLOSED"
            
            # --- ADDED: Protect E-STOP text from being overwritten ---
            - if:
                condition:
                  lambda: 'return !id(stop_active);'
                then:
                  - globals.set:
                      id: oled_info_global
                      value: '"DOOR CLOSED"'
            
            - binary_sensor.template.publish:
                id: ${devicename}_position
                state: OFF
            - cover.template.publish:
                id: ${devicename}_cover
                state: CLOSED
            - if:
                condition:
                  lambda: 'return !id(is_booting) && !id(stop_active);'
                then:
                  - display.page.show: page_main

      - if:
          condition:
            and:
              - binary_sensor.is_on: ${devicename}_open
              - binary_sensor.is_off: ${devicename}_closed
          then:
            - binary_sensor.template.publish:
                id: ${devicename}_status
                state: OFF
            - logger.log: "SCRIPT: Door Status OPEN"
            
            # --- ADDED: Protect E-STOP text from being overwritten ---
            - if:
                condition:
                  lambda: 'return !id(stop_active);'
                then:
                  - globals.set:
                      id: oled_info_global
                      value: '"DOOR OPEN"'

            - binary_sensor.template.publish:
                id: ${devicename}_position
                state: ON
            - cover.template.publish:
                id: ${devicename}_cover
                state: OPEN
            - if:
                condition:
                  lambda: 'return !id(is_booting) && !id(stop_active);'
                then:
                  - display.page.show: page_main

      - if:
          condition:
            or:
              - and:
                  - binary_sensor.is_on: ${devicename}_open
                  - binary_sensor.is_on: ${devicename}_closed
              - and:
                  - binary_sensor.is_off: ${devicename}_open
                  - binary_sensor.is_off: ${devicename}_closed
                  - lambda: 'return !id(garage_door_action_in_progress);'
          then:
            - logger.log: "SCRIPT: Door Status ERROR"
            
            # --- ADDED: Protect E-STOP text from being overwritten ---
            - if:
                condition:
                  lambda: 'return !id(stop_active);'
                then:
                  - globals.set:
                      id: oled_info_global
                      value: '"DOOR ERROR"'

            - binary_sensor.template.publish:
               id: ${devicename}_status
               state: ON

      - script.execute: set_action_complete_script
      - component.update: oled_info_text
      
      # Final update gate to keep the OLED on the E-STOP page
      - if:
          condition:
            lambda: 'return !id(is_booting) && !id(stop_active);'
          then:
            - component.update: oled_display
      # --- UPDATED GATE: Final Update check ---
      - if:
          condition:
            lambda: 'return !id(is_booting) && !id(stop_active);'
          then:
            - component.update: oled_display

  # A new script to handle the timeout error
  - id: garage_door_timeout_script
    then:
      - logger.log: "TIMEOUT: Garage door action timed out."
      - globals.set:
          id: oled_info_global
          value: '"DOOR TIMEOUT"'
      - binary_sensor.template.publish:
          id: ${devicename}_status
          state: ON
      - globals.set:
          id: garage_door_action_in_progress
          value: "false"
      - script.execute: ${devicename}_garage_door_status_script
      - component.update: oled_info_text
      - component.update: oled_display

###### END >> Garage Door position logic ######

###### START >> Garage Door Boot loading screen ######

  - id: boot_loading_script
    then:
      - lambda: 'id(is_booting) = true;'
      - display.page.show: page_boot
      - repeat:
          count: 100 # Go all the way to 100%
          then:
            - lambda: 'id(boot_progress) += 0.01;'
            - component.update: oled_display
            - delay: 300ms # Total 30 seconds
            
      # No more wait_until here!
      
      - lambda: 'id(is_booting) = false;'
      - logger.log: "Boot sequence finished. Local control enabled."
      - display.page.show: page_main
      - script.execute: ${devicename}_garage_door_status_script

###### END >> Garage Door Boot loading screen ######

###### START >> OLED Display ######

font:
  - file: 'font/consolas.ttf'
    id: font1
    size: 10

  - file: 'font/consolas.ttf'
    id: font2
    size: 12

  - file: 'font/consolas.ttf'
    id: font3
    size: 18

# https://esphome.io/components/i2c.html
i2c:
  sda: ${oled_sda}
  scl: ${oled_scl}
  scan: true

display:
  - platform: ssd1306_i2c
    model: "SSD1306 128x64"
    address: 0x3C
    id: oled_display
    pages:

     # --- BOOT LOADING PAGE ---
      - id: page_boot
        lambda: |-
          int w = it.get_width();
          int h = it.get_height();
          
          // Title
          it.print(w / 2, 0, id(font2), TextAlign::TOP_CENTER, "PiCOW-Garage");
          
          // Subtitle / License
          it.print(w / 2, 16, id(font1), TextAlign::TOP_CENTER, "Under MIT License");

          // Progress Bar Outline
          it.rectangle(10, 45, 108, 10);
          
          // Filling the Progress Bar
          int bar_width = (int)(104 * id(boot_progress));
          it.filled_rectangle(12, 47, bar_width, 6);

          // Percentage Text
          it.printf(w / 2, 28, id(font1), TextAlign::TOP_CENTER, "Initializing... %02d%%", (int)(id(boot_progress) * 100));

      # --- DASHBOARD PAGE ---
      - id: page_main
        lambda: |-
          int w = it.get_width();
          int h = it.get_height();

          // ZONE 1: HEADER
          it.printf(0, 0, id(font1), "GARAGE: %s", id(oled_info_global).c_str());
          it.line(0, 13, w, 13); 

          // ZONE 2: DYNAMIC CONTENT
          if (id(garage_door_action_in_progress)) {
            it.print(w / 2, 34, id(font3), TextAlign::CENTER, id(oled_info_global).c_str());
          } 
          else {
            if (id(oled_page) == 0) {
              it.printf(0, 18, id(font1), "WiFi: %s", id(${devicename}_wifi_signal_percentage).state.c_str());
              it.printf(0, 30, id(font1), "IP:   %s", id(${devicename}_ip_address).state.c_str());
              it.printf(0, 42, id(font1), "Up:   %s", id(${devicename}_uptime_oled).state.c_str());
            } 
            else if (id(oled_page) == 1) {
              it.printf(0, 18, id(font1), "Car:  %s", (id(${devicename}_car_presence_status).state) ? "PRESENT" : "AWAY");
              it.printf(0, 30, id(font1), "Out:  %.1f°C", id(${devicename}_dallas_outdoor_temperature).state);
              it.printf(0, 42, id(font1), "Box:  %.1f°C", id(${devicename}_dallas_case_temperature).state);
            }
          }

          // ZONE 3: FOOTER
          it.line(0, 52, w, 52); 
          it.printf(0, 54, id(font1), "CTRL:%s", (id(${devicename}_control_box_enabled).state) ? "ON" : "OFF");
          
          if (id(${devicename}_security_lockout).state) {
            it.print(w, 54, id(font1), TextAlign::TOP_RIGHT, "LOCKED");
          } else {
            it.print(w, 54, id(font1), TextAlign::TOP_RIGHT, "READY");
          }

      # --- CLOSE COUNTDOWN PAGE ---
      - id: countdown_page
        lambda: |-
          int w = it.get_width();
          int h = it.get_height();
          
          // Header Text
          it.print(w / 2, 2, id(font1), TextAlign::TOP_CENTER, "CLOSING IN");
          
          // Calculate Time Remaining
          unsigned long elapsed = millis() - id(countdown_start_time);
          int total_time_ms = ${control_box_close_wait_time};
          int remaining_ms = total_time_ms - (int)elapsed;
          if (remaining_ms < 0) remaining_ms = 0;
          
          // Large Countdown Text
          it.printf(w / 2, 18, id(font3), TextAlign::TOP_CENTER, "%02d secs", (remaining_ms / 1000));
          
          // Progress Bar Outline (Identical to page_boot)
          it.rectangle(10, 45, 108, 10);
          
          // Filling the Progress Bar (Draining Logic)
          float progress = (float)remaining_ms / (float)total_time_ms;
          int bar_width = (int)(104 * progress);
          
          // Only draw if there is progress remaining to avoid drawing artifacts
          if (bar_width > 0) {
            it.filled_rectangle(12, 47, bar_width, 6);
          }

      # --- EMERGENCY STOP PAGE ---
      - id: page_emergency_stop
        lambda: |-
          int w = it.get_width();
          int h = it.get_height();
          it.fill(COLOR_OFF); 
          
          if ((millis() / 500) % 2 == 0) {
            it.print(w / 2, h / 2, id(font2), COLOR_ON, TextAlign::CENTER, "!!! E-STOP !!!");
          }
          
          // Instruction pinned to the bottom
          it.print(w / 2, h - 5, id(font1), COLOR_ON, TextAlign::BASELINE_CENTER, "RELEASE TO RESET");
